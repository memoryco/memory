[package]
name = "memory"
version = "0.1.0"
edition = "2024"
description = "MCP server for cognitive AI memory (engram)"
license = "MIT"

[dependencies]
sml_mcps = "0.4.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
rusqlite = { version = "0.31", features = ["bundled"] }
diesel = { version = "2.2", features = ["sqlite", "returning_clauses_for_sqlite_3_35"] }
dirs = "6.0"
pdf-extract = "0.7"
thiserror = "2.0"
regex = "1.10"
fastembed = "5.8"

[dev-dependencies]
tempfile = "3.15"
