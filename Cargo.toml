[package]
name = "memory"
version = "0.1.0"
edition = "2024"
description = "MCP server for cognitive AI memory (engram)"
license = "MIT"

[dependencies]
sml_mcps = { path = "../sml_mcps" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
rusqlite = { version = "0.31", features = ["bundled"] }
dirs = "6.0"
