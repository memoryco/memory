<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Graph - MemoryCo.ai</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            overflow: hidden;
        }

        #branding {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #branding .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        #branding .title {
            font-size: 16px;
            font-weight: 600;
            color: #a0a0b0;
            letter-spacing: -0.02em;
        }

        #branding .title span {
            color: #8b5cf6;
        }

        #stats {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 100;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 100, 140, 0.2);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 13px;
            min-width: 180px;
        }

        #stats h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #606080;
            margin-bottom: 12px;
        }

        #stats .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        #stats .stat:last-child {
            margin-bottom: 0;
        }

        #stats .stat .label {
            color: #808090;
        }

        #stats .stat .value {
            color: #c0c0d0;
            font-weight: 500;
        }

        #tooltip {
            position: fixed;
            padding: 12px 16px;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            max-width: 350px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        #tooltip.visible {
            opacity: 1;
        }

        #tooltip .content {
            color: #e0e0f0;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        #tooltip .meta {
            font-size: 11px;
            color: #707090;
        }

        #tooltip .meta span {
            margin-right: 12px;
        }

        #tooltip .tags {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        #tooltip .tag {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
        }

        #graph {
            width: 100vw;
            height: 100vh;
        }

        .node {
            cursor: pointer;
            transition: filter 0.15s ease;
        }

        .node:hover {
            filter: brightness(1.3);
        }

        .link {
            stroke-linecap: round;
        }

        #legend {
            position: fixed;
            bottom: 20px;
            left: 24px;
            z-index: 100;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 100, 140, 0.2);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 12px;
        }

        #legend h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #606080;
            margin-bottom: 12px;
        }

        #legend .item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        #legend .item:last-child {
            margin-bottom: 0;
        }

        #legend .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        #legend .line {
            width: 24px;
            height: 3px;
            border-radius: 2px;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            right: 24px;
            z-index: 100;
            display: flex;
            gap: 8px;
        }

        #controls button {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 100, 140, 0.2);
            border-radius: 8px;
            padding: 10px 16px;
            color: #a0a0b0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        #controls button:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
            color: #c0c0d0;
        }
    </style>
</head>
<body>
    <div id="branding">
        <div class="logo">M</div>
        <div class="title">Memory<span>Co</span>.ai</div>
    </div>

    <div id="stats">
        <h3>Graph Stats</h3>
        <div class="stat">
            <span class="label">Memories</span>
            <span class="value" id="node-count">0</span>
        </div>
        <div class="stat">
            <span class="label">Associations</span>
            <span class="value" id="edge-count">0</span>
        </div>
        <div class="stat">
            <span class="label">Avg Energy</span>
            <span class="value" id="avg-energy">0</span>
        </div>
    </div>

    <div id="legend">
        <h3>Legend</h3>
        <div class="item">
            <div class="dot" style="background: #22c55e;"></div>
            <span>✨ Active (high energy)</span>
        </div>
        <div class="item">
            <div class="dot" style="background: #eab308;"></div>
            <span>💤 Dormant</span>
        </div>
        <div class="item">
            <div class="dot" style="background: #6366f1;"></div>
            <span>🌊 Deep</span>
        </div>
        <div class="item">
            <div class="dot" style="background: #64748b;"></div>
            <span>🧊 Archived</span>
        </div>
        <div class="item" style="margin-top: 8px;">
            <div class="line" style="background: rgba(139, 92, 246, 0.6);"></div>
            <span>Strong association</span>
        </div>
        <div class="item">
            <div class="line" style="background: rgba(139, 92, 246, 0.2);"></div>
            <span>Weak association</span>
        </div>
    </div>

    <div id="controls">
        <button onclick="resetZoom()">Reset View</button>
        <button onclick="toggleLabels()">Toggle Labels</button>
    </div>

    <div id="tooltip">
        <div class="content"></div>
        <div class="meta"></div>
        <div class="tags"></div>
    </div>

    <svg id="graph"></svg>

    <script>
        // Graph data injected by the server
        const graphData = {{GRAPH_DATA}};

        // State
        let showLabels = true;

        // Color mapping for states
        const stateColors = {
            '✨': '#22c55e',
            '💤': '#eab308',
            '🌊': '#6366f1',
            '🧊': '#64748b'
        };

        function getNodeColor(node) {
            return stateColors[node.state] || '#6366f1';
        }

        function getNodeRadius(node) {
            // Base size on energy and access count
            const base = 6;
            const energyBonus = node.energy * 8;
            const accessBonus = Math.min(node.access_count * 0.5, 6);
            return base + energyBonus + accessBonus;
        }

        // Update stats
        document.getElementById('node-count').textContent = graphData.nodes.length;
        document.getElementById('edge-count').textContent = graphData.edges.length;
        const avgEnergy = graphData.nodes.length > 0 
            ? (graphData.nodes.reduce((sum, n) => sum + n.energy, 0) / graphData.nodes.length).toFixed(2)
            : '0.00';
        document.getElementById('avg-energy').textContent = avgEnergy;

        // Set up SVG
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select('#graph')
            .attr('width', width)
            .attr('height', height);

        // Create container for zoom
        const container = svg.append('g');

        // Set up zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => {
                container.attr('transform', event.transform);
            });

        svg.call(zoom);

        // Create arrow marker for edges
        svg.append('defs').append('marker')
            .attr('id', 'arrowhead')
            .attr('viewBox', '0 -5 10 10')
            .attr('refX', 20)
            .attr('refY', 0)
            .attr('markerWidth', 6)
            .attr('markerHeight', 6)
            .attr('orient', 'auto')
            .append('path')
            .attr('d', 'M0,-5L10,0L0,5')
            .attr('fill', 'rgba(139, 92, 246, 0.4)');

        // Create force simulation
        const simulation = d3.forceSimulation(graphData.nodes)
            .force('link', d3.forceLink(graphData.edges)
                .id(d => d.id)
                .distance(d => 100 - d.weight * 50)
                .strength(d => d.weight * 0.5))
            .force('charge', d3.forceManyBody()
                .strength(-200)
                .distanceMax(400))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => getNodeRadius(d) + 10));

        // Create edges
        const links = container.append('g')
            .selectAll('line')
            .data(graphData.edges)
            .enter()
            .append('line')
            .attr('class', 'link')
            .attr('stroke', d => `rgba(139, 92, 246, ${0.1 + d.weight * 0.5})`)
            .attr('stroke-width', d => 1 + d.weight * 3)
            .attr('marker-end', 'url(#arrowhead)');

        // Create nodes
        const nodes = container.append('g')
            .selectAll('circle')
            .data(graphData.nodes)
            .enter()
            .append('circle')
            .attr('class', 'node')
            .attr('r', d => getNodeRadius(d))
            .attr('fill', d => getNodeColor(d))
            .attr('stroke', d => d3.color(getNodeColor(d)).brighter(0.5))
            .attr('stroke-width', 2)
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended));

        // Create labels
        const labels = container.append('g')
            .selectAll('text')
            .data(graphData.nodes)
            .enter()
            .append('text')
            .attr('class', 'label')
            .attr('text-anchor', 'middle')
            .attr('dy', d => getNodeRadius(d) + 14)
            .attr('fill', '#808090')
            .attr('font-size', '11px')
            .text(d => d.label);

        // Tooltip handling
        const tooltip = document.getElementById('tooltip');

        nodes.on('mouseover', (event, d) => {
            tooltip.querySelector('.content').textContent = d.label;
            tooltip.querySelector('.meta').innerHTML = `
                <span>${d.state} Energy: ${d.energy.toFixed(2)}</span>
                <span>Accessed: ${d.access_count}x</span>
            `;
            
            const tagsHtml = d.tags.map(t => `<span class="tag">${t}</span>`).join('');
            tooltip.querySelector('.tags').innerHTML = tagsHtml;
            
            tooltip.classList.add('visible');
        });

        nodes.on('mousemove', (event) => {
            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY + 15) + 'px';
        });

        nodes.on('mouseout', () => {
            tooltip.classList.remove('visible');
        });

        // Simulation tick
        simulation.on('tick', () => {
            links
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);

            nodes
                .attr('cx', d => d.x)
                .attr('cy', d => d.y);

            labels
                .attr('x', d => d.x)
                .attr('y', d => d.y);
        });

        // Drag handlers
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Controls
        function resetZoom() {
            svg.transition().duration(500).call(
                zoom.transform,
                d3.zoomIdentity.translate(width / 2, height / 2).scale(1).translate(-width / 2, -height / 2)
            );
        }

        function toggleLabels() {
            showLabels = !showLabels;
            labels.attr('opacity', showLabels ? 1 : 0);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            svg.attr('width', newWidth).attr('height', newHeight);
            simulation.force('center', d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
